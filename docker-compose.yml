version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam-portal
    ports:
      - "3000:3000"
    volumes:
      - prisma_data:/app/prisma
    environment:
      - NODE_ENV=production
      # Pass through any required environment variables here
      - JWT_SECRET=${JWT_SECRET:-your-fallback-jwt-secret-here-1234567890}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

volumes:
  prisma_data:
    description: "Persistent storage for SQLite database"
